name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "dist/"
          target: "/home/ubuntu/website/"
          rm: false

      - name: Reload nginx + purge stale /intelligence detail pages
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 2m
          script: |
            # /intelligence taken offline (President L5②, 2026-05-30). The SCP
            # upload uses rm:false, so previously-deployed per-date detail pages
            # (e.g. intelligence/daily/2026-05-30/) would remain and keep serving
            # FABRICATED content. The new build emits only redirect stubs at the
            # *index* paths (intelligence/{,daily/,decisions/,results/}index.html)
            # and NO detail dirs — so purge stale per-date detail dirs while
            # KEEPING the index.html redirect stubs.
            # REVERSIBLE: this only deletes already-stale server artifacts; the
            # genuine sources live in git and rebuild on restore.
            ROOT=/home/ubuntu/website/dist
            for SEC in intelligence/daily intelligence/decisions intelligence/results \
                       en/intelligence/daily en/intelligence/decisions en/intelligence/results; do
              if [ -d "$ROOT/$SEC" ]; then
                # remove every per-date subdirectory but keep index.html (redirect stub)
                find "$ROOT/$SEC" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
              fi
            done
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployment completed successfully"
