name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "dist/"
          target: "/home/ubuntu/website/"
          rm: false

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 2m
          script: |
            # RESTORED (2026-06-02): /intelligence detail pages are live again.
            # The old purge loop (which deleted intelligence/daily/YYYY-MM-DD/ dirs
            # after upload) was introduced when /intelligence was taken offline on
            # 2026-05-30 (President L5②). It was the root cause of 404s on all
            # /intelligence/daily/[date] routes despite the Astro build generating
            # them correctly. Removed — detail pages are now served as built.
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployment completed successfully"
