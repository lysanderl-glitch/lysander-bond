name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "dist/"
          target: "/home/ubuntu/website/"
          rm: false

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 2m
          script: |
            # RESTORED (2026-06-02): /intelligence detail pages are live again.
            # The old purge loop (which deleted intelligence/daily/YYYY-MM-DD/ dirs
            # after upload) was introduced when /intelligence was taken offline on
            # 2026-05-30 (President L5②). It was the root cause of 404s on all
            # /intelligence/daily/[date] routes despite the Astro build generating
            # them correctly. Removed — detail pages are now served as built.
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployment completed successfully"

      - name: Wait for nginx reload
        run: sleep 30
        # Allow nginx reload + CDN propagation before running ATDD verification

      - name: Set up Python for QA
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QA dependencies
        run: pip install -r .github/scripts/requirements-qa.txt

      - name: ATDD CI Gate — P0 TC Verification
        id: atdd_gate
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          VERIFY_TIMEOUT: '30'
        run: |
          python .github/scripts/run_atdd_gate.py 2>&1 | tee /tmp/gate_output.txt
          exit ${PIPESTATUS[0]}
        # Silent Fail 防御: HTTP 200 ≠ 业务 artifact 正确生成
        # P0 通过率 < 100% → workflow fail（不影响已完成的 deploy，但记录问题）
        # P1 通过率 < 80% → warning（不阻断）
        # 注意：CI Gate 在 deploy 之后运行，失败不回滚 deploy，
        # 但会在 GHA 中标记 workflow 失败，触发 on-failure 通知

      - name: P3-A4 — Generate Living Documentation
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          ATDD_GATE_OUTPUT: /tmp/gate_output.txt
        run: |
          REPORT_DATE=$(TZ=Asia/Dubai date +%Y-%m-%d)
          REPORT_PATH="/tmp/atdd-qa-${REPORT_DATE}.md"
          python .github/scripts/generate_living_doc.py "${REPORT_PATH}"
          echo "LIVING_DOC_PATH=${REPORT_PATH}" >> "$GITHUB_ENV"
          echo "LIVING_DOC_DATE=${REPORT_DATE}" >> "$GITHUB_ENV"
          echo "--- Living Doc Preview (first 20 lines) ---"
          head -20 "${REPORT_PATH}"

      - name: P3-A4 — Upload Living Documentation as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atdd-qa-report-${{ github.run_id }}
          path: /tmp/atdd-qa-*.md
          retention-days: 30
