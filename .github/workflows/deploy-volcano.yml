name: Deploy to Volcano (synapsehd.com)

# push to main 自动触发 + 手动备用触发
# ⚠️ 前置条件：GitHub 仓库 Settings → Secrets → VOLCANO_SSH_KEY 需总裁手动配置
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with synapsehd.com SITE_URL
        run: npm run build
        env:
          SITE_URL: https://synapsehd.com

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VOLCANO_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 118.196.41.252 >> ~/.ssh/known_hosts

      - name: Rsync dist/ to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ \
            root@118.196.41.252:/home/synapsehd-website/dist/

      - name: Reload nginx
        run: |
          ssh -o StrictHostKeyChecking=no root@118.196.41.252 "nginx -t && systemctl reload nginx"

      - name: Verify deployment
        run: |
          sleep 5
          curl -sIL --max-time 15 https://synapsehd.com/ || \
            curl -sIL --max-time 15 http://www.synapsehd.com/ | head -3
