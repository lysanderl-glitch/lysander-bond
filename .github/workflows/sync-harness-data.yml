name: Sync Harness Dashboard Data

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 06:00 Dubai
  workflow_dispatch:      # allow manual trigger from GitHub Actions UI

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout lysander-bond
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout synapse-ops
        uses: actions/checkout@v4
        with:
          repository: lysanderl-glitch/synapse-ops
          token: ${{ secrets.SYNAPSE_OPS_PAT || github.token }}
          path: synapse-ops
        continue-on-error: true
        id: checkout_ops

      - name: Generate harness data JSON
        run: |
          set -e
          mkdir -p public/harness-data
          TODAY=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          DATE=$(date -u +"%Y-%m-%d")

          # Read CLAUDE.md line count from synapse-ops (fallback to cached)
          if [ -f synapse-ops/CLAUDE.md ]; then
            LINES=$(wc -l < synapse-ops/CLAUDE.md | tr -d ' ')
            echo "Read CLAUDE.md from synapse-ops: $LINES lines"
          else
            LINES=$(python3 -c "import json; d=json.load(open('public/harness-data/entropy.json')); print(d.get('claude_md_lines', d.get('lines', 185)))" 2>/dev/null || echo "185")
            echo "synapse-ops not available, using cached CLAUDE.md lines: $LINES"
          fi

          LIMIT=280
          HEADROOM=$((LIMIT - LINES))
          if [ "$LINES" -le 250 ]; then
            STATUS="ok"
          elif [ "$LINES" -le 270 ]; then
            STATUS="warning"
          else
            STATUS="critical"
          fi

          # entropy.json
          cat > public/harness-data/entropy.json << ENDJSON
          {
            "claude_md_lines": $LINES,
            "limit": $LIMIT,
            "headroom": $HEADROOM,
            "status": "$STATUS",
            "generated_at": "$TODAY"
          }
          ENDJSON

          # pulse.json — update timestamp + entropy; preserve other fields via python3
          python3 - << ENDPY
          import json, os
          path = "public/harness-data/pulse.json"
          try:
              d = json.load(open(path))
          except Exception:
              d = {}
          d["generated_at"] = "$TODAY"
          d["claude_md_lines"] = $LINES
          d["health"] = "green"
          d["note"] = "Auto-synced by GitHub Actions"
          json.dump(d, open(path, "w"), indent=2, ensure_ascii=False)
          print(f"pulse.json updated: {path}")
          ENDPY

          echo "entropy/pulse sync complete: CLAUDE.md=$LINES lines ($STATUS)"

      - name: Generate tasks.json from active_tasks.yaml
        run: |
          set -e
          TODAY=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          python3 - << 'ENDPY'
          import json, os, sys

          task_yaml_path = "synapse-ops/agent-CEO/config/active_tasks.yaml"
          out_path = "public/harness-data/tasks.json"
          generated_at = os.environ.get("TODAY_ISO", "")

          import subprocess, datetime
          generated_at = subprocess.check_output(["date", "-u", "+%Y-%m-%dT%H:%M:%S.000Z"]).decode().strip()

          if not os.path.exists(task_yaml_path):
              print(f"WARNING: {task_yaml_path} not found — preserving cached tasks.json with refreshed timestamp")
              try:
                  d = json.load(open(out_path))
              except Exception:
                  d = {"in_progress": [], "blocked": [], "count": {"in_progress": 0, "blocked": 0, "total": 0}}
              d["generated_at"] = generated_at
              d["source"] = "cached_fallback"
              json.dump(d, open(out_path, "w"), indent=2, ensure_ascii=False)
              sys.exit(0)

          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "pyyaml", "-q"])
              import yaml

          with open(task_yaml_path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or {}

          tasks = data.get("tasks", [])
          in_progress = []
          blocked = []

          for t in tasks:
              status = t.get("status", "")
              task_id = t.get("id", "")
              title = t.get("title", "")
              team = t.get("team", "")
              priority = t.get("priority", "")
              entry = {"id": task_id, "title": title, "team": team, "priority": priority}
              if status == "in_progress":
                  in_progress.append(entry)
              elif status == "blocked":
                  blocked.append(entry)

          result = {
              "in_progress": [e["id"] for e in in_progress],
              "blocked": [e["id"] for e in blocked],
              "details": in_progress + blocked,
              "count": {
                  "in_progress": len(in_progress),
                  "blocked": len(blocked),
                  "total": len(in_progress) + len(blocked)
              },
              "generated_at": generated_at,
              "source": "active_tasks_yaml"
          }

          json.dump(result, open(out_path, "w"), indent=2, ensure_ascii=False)
          print(f"tasks.json updated: in_progress={len(in_progress)}, blocked={len(blocked)}, total={result['count']['total']}")
          ENDPY

      - name: Generate decisions.json from decision-log
        run: |
          set -e

          python3 - << 'ENDPY'
          import json, os, sys, re, glob

          dec_log_path = "synapse-ops/obs/04-decision-knowledge/decision-log"
          out_path = "public/harness-data/decisions.json"

          import subprocess
          generated_at = subprocess.check_output(["date", "-u", "+%Y-%m-%dT%H:%M:%S.000Z"]).decode().strip()

          if not os.path.exists(dec_log_path):
              print(f"WARNING: {dec_log_path} not found — preserving cached decisions.json with refreshed timestamp")
              try:
                  d = json.load(open(out_path))
              except Exception:
                  d = {"recent": []}
              d["generated_at"] = generated_at
              d["source"] = "cached_fallback"
              json.dump(d, open(out_path, "w"), indent=2, ensure_ascii=False)
              sys.exit(0)

          # Parse frontmatter from each .md file
          frontmatter_re = re.compile(r'^---\s*\n(.*?)\n---', re.DOTALL)
          decisions = []

          md_files = glob.glob(os.path.join(dec_log_path, "*.md"))
          for fpath in md_files:
              fname = os.path.basename(fpath)
              if fname.startswith("_"):
                  continue
              try:
                  content = open(fpath, "r", encoding="utf-8").read()
                  m = frontmatter_re.match(content)
                  if not m:
                      continue
                  fm_text = m.group(1)

                  def get_field(text, key):
                      pat = re.compile(rf'^{key}:\s*(.+)$', re.MULTILINE)
                      match = pat.search(text)
                      return match.group(1).strip() if match else ""

                  doc_id = get_field(fm_text, "id")
                  date_str = get_field(fm_text, "date")

                  # Extract title from first H1 heading after frontmatter
                  title_m = re.search(r'^#\s+(.+)$', content[m.end():], re.MULTILINE)
                  title = title_m.group(1).strip() if title_m else fname.replace(".md", "")
                  # Strip leading ID prefix from title if present (e.g. "D-2026-0427-003 — ...")
                  title = re.sub(r'^D-[\d\-]+\s*[—–-]+\s*', '', title).strip()

                  if not doc_id:
                      doc_id = fname.replace(".md", "")
                  if not date_str:
                      # Try to extract from filename D-YYYY-MMDD or D-YYYY-MM-DD
                      date_m = re.search(r'D-(\d{4})-?(\d{2})-?(\d{2,3})', fname)
                      if date_m:
                          y = date_m.group(1)
                          rest = date_m.group(2) + date_m.group(3)
                          if len(rest) == 4:
                              date_str = f"{y}-{rest[:2]}-{rest[2:]}"
                          else:
                              date_str = f"{y}-{date_m.group(2)}-{date_m.group(3)[:2]}"

                  decisions.append({"id": doc_id, "title": title, "date": date_str, "_sort_key": date_str or "0000"})
              except Exception as e:
                  print(f"  skip {fname}: {e}")

          # Sort by date descending, take top 10
          decisions.sort(key=lambda x: x["_sort_key"], reverse=True)
          recent = [{"id": d["id"], "title": d["title"], "date": d["date"]} for d in decisions[:10]]

          result = {
              "recent": recent,
              "total_scanned": len(decisions),
              "generated_at": generated_at,
              "source": "decision_log_md"
          }

          json.dump(result, open(out_path, "w"), indent=2, ensure_ascii=False)
          print(f"decisions.json updated: {len(recent)} recent (of {len(decisions)} total)")
          ENDPY

      - name: Refresh violations.json timestamp
        run: |
          set -e

          python3 - << 'ENDPY'
          import json, os

          out_path = "public/harness-data/violations.json"
          import subprocess
          generated_at = subprocess.check_output(["date", "-u", "+%Y-%m-%dT%H:%M:%S.000Z"]).decode().strip()

          try:
              d = json.load(open(out_path))
          except Exception:
              d = {"today": 0, "this_week": 0, "high_risk": 0, "recent": []}

          d["generated_at"] = generated_at
          # Note: violations data sourced from local ceo-guard-audit.log (not in synapse-ops).
          # Counts are not updated here; only timestamp is refreshed to confirm daily run.
          d["source"] = "local_log_not_available_in_gha"

          json.dump(d, open(out_path, "w"), indent=2, ensure_ascii=False)
          print(f"violations.json timestamp refreshed: {generated_at}")
          ENDPY

      - name: Business assertion — verify all files updated today
        run: |
          set -e
          DATE=$(date -u +"%Y-%m-%d")
          FAILED=0

          for FILE in entropy.json pulse.json tasks.json decisions.json violations.json; do
            PATH_F="public/harness-data/$FILE"
            if [ ! -f "$PATH_F" ]; then
              echo "ASSERT FAIL: $FILE does not exist"
              FAILED=1
              continue
            fi
            GEN=$(python3 -c "import json; d=json.load(open('$PATH_F')); print(d.get('generated_at',''))" 2>/dev/null || echo "")
            if echo "$GEN" | grep -q "^$DATE"; then
              echo "ASSERT OK: $FILE generated_at=$GEN"
            else
              echo "ASSERT FAIL: $FILE generated_at='$GEN' does not match today=$DATE"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "Silent Fail guard triggered: one or more harness data files were not updated today."
            exit 1
          fi
          echo "All assertions passed — daily sync confirmed."

      - name: Commit and push if changed
        run: |
          git config user.name "lysander-bot"
          git config user.email "lysanderl@janusd.com"
          git add public/harness-data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore(dash): daily harness data sync $(date -u +%Y-%m-%d) [no-decision]"
            git push
          fi
