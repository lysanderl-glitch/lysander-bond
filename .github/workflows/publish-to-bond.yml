name: Publish Intel Content to Bond (Fallback Cron)

on:
  schedule:
    - cron: '30 1 * * *'   # UTC 01:30 — fallback if intel-action dispatch missed
  workflow_dispatch:         # manual trigger for backfill/testing
    inputs:
      date_override:
        description: 'Publish specific date YYYY-MM-DD (optional, default: latest)'
        required: false

jobs:
  publish-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout lysander-bond
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Synapse-Mini (for publish script)
        uses: actions/checkout@v4
        with:
          repository: lysanderl-oss/Synapse
          path: synapse-mini

      - name: Checkout synapse-ops (for intel data)
        uses: actions/checkout@v4
        with:
          repository: lysanderl-glitch/synapse-ops
          token: ${{ secrets.SYNAPSE_OPS_PAT }}
          path: synapse-ops

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Publish intel daily content (ZH + EN)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL: MiniMax-M2.7
          BOND_ROOT: ${{ github.workspace }}
          SYNAPSE_OPS_ROOT: ${{ github.workspace }}/synapse-ops
        run: |
          python synapse-mini/scripts/intelligence/publish_to_bond.py --type daily --lang both

      - name: Business assertion — verify today's files exist
        run: |
          DATE="${{ github.event.inputs.date_override }}"
          if [ -z "$DATE" ]; then
            # Get Dubai date (UTC+4)
            DATE=$(TZ='Asia/Dubai' date +%Y-%m-%d)
          fi
          ZH_FILE="src/content/intelligence/daily/${DATE}.md"
          EN_FILE="src/content/intelligence/daily/${DATE}-en.md"

          if [ ! -f "$ZH_FILE" ]; then
            echo "ASSERTION FAILED: ZH file missing: $ZH_FILE"
            exit 1
          fi
          if [ ! -f "$EN_FILE" ]; then
            echo "ASSERTION FAILED: EN file missing: $EN_FILE"
            exit 1
          fi
          echo "Assertion passed: ZH and EN files exist for $DATE"

      - name: Commit and push
        run: |
          git config user.email "lysanderl@janusd.com"
          git config user.name "Lysander"
          git add src/content/intelligence/
          if git diff --staged --quiet; then
            echo "No new content to commit (already up to date)"
          else
            git commit -m "chore(intel): fallback-publish $(TZ='Asia/Dubai' date +%Y-%m-%d) intel content (ZH+EN) [skip ci]"
            git push
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_N8N: ${{ secrets.SLACK_WEBHOOK_N8N }}
        run: |
          DATE=$(TZ='Asia/Dubai' date +%Y-%m-%d)
          curl -s -X POST "$SLACK_WEBHOOK_N8N" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"publish-to-bond FAILED: $DATE — check GHA logs\"}"
