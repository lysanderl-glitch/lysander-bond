<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#0A1628"/>
  <rect x="0" y="400" width="800" height="100" fill="#0d1f3c"/>

  <!-- Grid floor -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#1a2d4a" stroke-width="1"/>
  <line x1="100" y1="400" x2="200" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="200" y1="400" x2="300" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="300" y1="400" x2="400" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="400" y1="400" x2="500" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="500" y1="400" x2="600" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="600" y1="400" x2="700" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="700" y1="400" x2="800" y2="500" stroke="#1a2d4a" stroke-width="0.5"/>

  <!-- Glow effects -->
  <circle cx="400" cy="200" r="200" fill="url(#glow1)" opacity="0.3"/>
  <circle cx="250" cy="300" r="150" fill="url(#glow2)" opacity="0.2"/>
  <defs>
    <radialGradient id="glow1"><stop offset="0%" stop-color="#FCAD2A"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <radialGradient id="glow2"><stop offset="0%" stop-color="#028CDC"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>

  <!-- Connection lines (synapse network) -->
  <line x1="400" y1="160" x2="200" y2="280" stroke="#028CDC" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="160" x2="600" y2="280" stroke="#028CDC" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="160" x2="300" y2="340" stroke="#FCAD2A" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="160" x2="500" y2="340" stroke="#FCAD2A" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="280" x2="100" y2="350" stroke="#028CDC" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="280" x2="300" y2="340" stroke="#028CDC" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="280" x2="500" y2="340" stroke="#028CDC" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="280" x2="700" y2="350" stroke="#028CDC" stroke-width="1" opacity="0.2"/>

  <!-- President (top center) -->
  <circle cx="400" cy="120" r="30" fill="#FCAD2A" opacity="0.15"/>
  <circle cx="400" cy="105" r="16" fill="#FCAD2A"/>
  <rect x="384" y="125" width="32" height="35" rx="8" fill="#FCAD2A"/>
  <text x="400" y="180" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="11" font-weight="700">总裁</text>

  <!-- Lysander CEO (below president) -->
  <circle cx="400" cy="235" r="25" fill="#028CDC" opacity="0.1"/>
  <circle cx="400" cy="222" r="14" fill="#028CDC"/>
  <rect x="386" y="240" width="28" height="30" rx="6" fill="#028CDC"/>
  <text x="400" y="288" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="10" font-weight="600">Lysander</text>

  <!-- Team members - left group (Graphify) -->
  <circle cx="180" cy="310" r="11" fill="#FCAD2A" opacity="0.8"/>
  <rect x="170" y="324" width="20" height="22" rx="5" fill="#FCAD2A" opacity="0.8"/>
  <circle cx="220" cy="310" r="11" fill="#FCAD2A" opacity="0.6"/>
  <rect x="210" y="324" width="20" height="22" rx="5" fill="#FCAD2A" opacity="0.6"/>
  <circle cx="140" cy="330" r="10" fill="#FCAD2A" opacity="0.4"/>
  <rect x="130" y="343" width="20" height="20" rx="5" fill="#FCAD2A" opacity="0.4"/>
  <text x="180" y="378" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="9" opacity="0.7">智囊团</text>

  <!-- Team members - center-left (Butler) -->
  <circle cx="300" cy="335" r="10" fill="#028CDC" opacity="0.7"/>
  <rect x="290" y="348" width="20" height="22" rx="5" fill="#028CDC" opacity="0.7"/>
  <circle cx="340" cy="340" r="9" fill="#028CDC" opacity="0.5"/>
  <rect x="331" y="352" width="18" height="20" rx="5" fill="#028CDC" opacity="0.5"/>
  <text x="320" y="385" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="9" opacity="0.6">执行团队</text>

  <!-- Team members - center-right (RD) -->
  <circle cx="460" cy="335" r="10" fill="#028CDC" opacity="0.7"/>
  <rect x="450" y="348" width="20" height="22" rx="5" fill="#028CDC" opacity="0.7"/>
  <circle cx="500" cy="340" r="9" fill="#028CDC" opacity="0.5"/>
  <rect x="491" y="352" width="18" height="20" rx="5" fill="#028CDC" opacity="0.5"/>
  <text x="480" y="385" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="9" opacity="0.6">研发团队</text>

  <!-- Team members - right group (Harness Ops) -->
  <circle cx="600" cy="310" r="11" fill="#013A7D" opacity="0.8"/>
  <rect x="590" y="324" width="20" height="22" rx="5" fill="#013A7D" opacity="0.8"/>
  <circle cx="640" cy="310" r="11" fill="#013A7D" opacity="0.6"/>
  <rect x="630" y="324" width="20" height="22" rx="5" fill="#013A7D" opacity="0.6"/>
  <circle cx="670" cy="335" r="9" fill="#013A7D" opacity="0.4"/>
  <rect x="661" y="348" width="18" height="20" rx="5" fill="#013A7D" opacity="0.4"/>
  <text x="630" y="378" text-anchor="middle" fill="#88AADD" font-family="Inter,sans-serif" font-size="9" opacity="0.7">Harness Ops</text>

  <!-- Far left group -->
  <circle cx="80" cy="345" r="8" fill="#028CDC" opacity="0.3"/>
  <rect x="72" y="356" width="16" height="18" rx="4" fill="#028CDC" opacity="0.3"/>
  <circle cx="110" cy="350" r="7" fill="#028CDC" opacity="0.25"/>
  <rect x="103" y="360" width="14" height="16" rx="4" fill="#028CDC" opacity="0.25"/>

  <!-- Far right group -->
  <circle cx="720" cy="345" r="8" fill="#028CDC" opacity="0.3"/>
  <rect x="712" y="356" width="16" height="18" rx="4" fill="#028CDC" opacity="0.3"/>
  <circle cx="740" cy="355" r="7" fill="#028CDC" opacity="0.25"/>
  <rect x="733" y="365" width="14" height="16" rx="4" fill="#028CDC" opacity="0.25"/>

  <!-- Node dots on connections -->
  <circle cx="300" cy="220" r="4" fill="#028CDC" opacity="0.5"/>
  <circle cx="500" cy="220" r="4" fill="#028CDC" opacity="0.5"/>
  <circle cx="250" cy="310" r="3" fill="#FCAD2A" opacity="0.4"/>
  <circle cx="550" cy="310" r="3" fill="#FCAD2A" opacity="0.4"/>

  <!-- Stats bar at bottom -->
  <rect x="50" y="420" width="700" height="50" rx="10" fill="#0d1f3c" stroke="#1a2d4a" stroke-width="1"/>
  <text x="150" y="445" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="22" font-weight="900">10</text>
  <text x="150" y="460" text-anchor="middle" fill="#64748B" font-family="Inter,sans-serif" font-size="9">团队</text>
  <text x="300" y="445" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="22" font-weight="900">49</text>
  <text x="300" y="460" text-anchor="middle" fill="#64748B" font-family="Inter,sans-serif" font-size="9">Agent</text>
  <text x="450" y="445" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="22" font-weight="900">93.8</text>
  <text x="450" y="460" text-anchor="middle" fill="#64748B" font-family="Inter,sans-serif" font-size="9">审计均分</text>
  <text x="600" y="445" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="22" font-weight="900">24/7</text>
  <text x="600" y="460" text-anchor="middle" fill="#64748B" font-family="Inter,sans-serif" font-size="9">运转</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="14" font-weight="700" letter-spacing="3">S Y N A P S E</text>
  <text x="400" y="72" text-anchor="middle" fill="#64748B" font-family="Inter,sans-serif" font-size="10">AI Agent 团队协作运营体系</text>
</svg>
