<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#F7F8FA"/>

  <!-- Round table -->
  <ellipse cx="400" cy="250" rx="200" ry="60" fill="#E2E8F0" opacity="0.5"/>
  <ellipse cx="400" cy="245" rx="190" ry="55" fill="white" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Document on table -->
  <rect x="360" y="225" width="80" height="50" rx="4" fill="white" stroke="#028CDC" stroke-width="1.5"/>
  <line x1="372" y1="238" x2="428" y2="238" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="372" y1="248" x2="420" y2="248" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="372" y1="258" x2="410" y2="258" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" fill="#94A3B8" font-family="Inter,sans-serif" font-size="9">评审方案</text>

  <!-- Expert 1: Strategist (top) -->
  <circle cx="400" cy="140" r="24" fill="#013A7D" opacity="0.1"/>
  <circle cx="400" cy="128" r="15" fill="#013A7D"/>
  <circle cx="395" cy="125" r="2" fill="white"/>
  <circle cx="405" cy="125" r="2" fill="white"/>
  <path d="M393 131 Q400 136 407 131" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="387" y="146" width="26" height="28" rx="6" fill="#013A7D"/>
  <text x="400" y="190" text-anchor="middle" fill="#013A7D" font-family="Inter,sans-serif" font-size="9" font-weight="600">战略分析师</text>
  <!-- Score card -->
  <rect x="430" y="130" width="32" height="20" rx="4" fill="#FCAD2A"/>
  <text x="446" y="144" text-anchor="middle" fill="#0A1628" font-family="Inter,sans-serif" font-size="11" font-weight="900">5/5</text>

  <!-- Expert 2: Decision Advisor (left) -->
  <circle cx="220" cy="200" r="22" fill="#FCAD2A" opacity="0.1"/>
  <circle cx="220" cy="189" r="14" fill="#FCAD2A"/>
  <circle cx="215" cy="186" r="2" fill="#0A1628"/>
  <circle cx="225" cy="186" r="2" fill="#0A1628"/>
  <path d="M213 192 Q220 197 227 192" stroke="#0A1628" stroke-width="1.5" fill="none"/>
  <rect x="207" y="206" width="26" height="26" rx="6" fill="#FCAD2A"/>
  <text x="220" y="248" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="9" font-weight="600">决策顾问</text>
  <rect x="248" y="190" width="32" height="20" rx="4" fill="#FCAD2A"/>
  <text x="264" y="204" text-anchor="middle" fill="#0A1628" font-family="Inter,sans-serif" font-size="11" font-weight="900">5/5</text>

  <!-- Expert 3: Trend Watcher (right) -->
  <circle cx="580" cy="200" r="22" fill="#028CDC" opacity="0.1"/>
  <circle cx="580" cy="189" r="14" fill="#028CDC"/>
  <circle cx="575" cy="186" r="2" fill="white"/>
  <circle cx="585" cy="186" r="2" fill="white"/>
  <path d="M573 192 Q580 197 587 192" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="567" y="206" width="26" height="26" rx="6" fill="#028CDC"/>
  <text x="580" y="248" text-anchor="middle" fill="#028CDC" font-family="Inter,sans-serif" font-size="9" font-weight="600">趋势洞察师</text>
  <rect x="520" y="190" width="32" height="20" rx="4" fill="#FCAD2A"/>
  <text x="536" y="204" text-anchor="middle" fill="#0A1628" font-family="Inter,sans-serif" font-size="11" font-weight="900">5/5</text>

  <!-- Expert 4: Frontend Dev (bottom-left) -->
  <circle cx="300" cy="300" r="20" fill="#7C3AED" opacity="0.1"/>
  <circle cx="300" cy="290" r="13" fill="#7C3AED"/>
  <circle cx="296" cy="287" r="2" fill="white"/>
  <circle cx="304" cy="287" r="2" fill="white"/>
  <path d="M294 293 Q300 297 306 293" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="288" y="306" width="24" height="24" rx="5" fill="#7C3AED"/>
  <text x="300" y="345" text-anchor="middle" fill="#7C3AED" font-family="Inter,sans-serif" font-size="9" font-weight="600">前端开发</text>
  <rect x="326" y="290" width="32" height="20" rx="4" fill="#FCAD2A"/>
  <text x="342" y="304" text-anchor="middle" fill="#0A1628" font-family="Inter,sans-serif" font-size="11" font-weight="900">5/5</text>

  <!-- Expert 5: GTM (bottom-right) -->
  <circle cx="500" cy="300" r="20" fill="#F97316" opacity="0.1"/>
  <circle cx="500" cy="290" r="13" fill="#F97316"/>
  <circle cx="496" cy="287" r="2" fill="white"/>
  <circle cx="504" cy="287" r="2" fill="white"/>
  <path d="M494 293 Q500 297 506 293" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="488" y="306" width="24" height="24" rx="5" fill="#F97316"/>
  <text x="500" y="345" text-anchor="middle" fill="#F97316" font-family="Inter,sans-serif" font-size="9" font-weight="600">GTM策略师</text>
  <rect x="442" y="290" width="32" height="20" rx="4" fill="#FCAD2A"/>
  <text x="458" y="304" text-anchor="middle" fill="#0A1628" font-family="Inter,sans-serif" font-size="11" font-weight="900">5/5</text>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#334155" font-family="Inter,sans-serif" font-size="16" font-weight="700">专家评审会</text>
  <text x="400" y="60" text-anchor="middle" fill="#94A3B8" font-family="Inter,sans-serif" font-size="11">5位专家独立打分 · 均分 5.0 · 全票通过</text>

  <!-- Verdict badge -->
  <rect x="320" y="365" width="160" height="30" rx="15" fill="#013A7D"/>
  <text x="400" y="385" text-anchor="middle" fill="#FCAD2A" font-family="Inter,sans-serif" font-size="12" font-weight="700">⭐ 满分通过 · 批准执行</text>
</svg>
